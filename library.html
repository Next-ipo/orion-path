<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Library | ORION PATH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <header class="library-hero container fade-in">
        <a href="index.html" style="color: var(--accent-blue); text-decoration: none; font-size: 0.9rem; margin-bottom: 1rem; display: inline-block;">← Back to Home</a>
        <h1 style="font-size: 3.5rem; margin-bottom: 1rem;">Celestial Library</h1>
        <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto;">Notionに蓄積された星空の叡智を、ここに再構築。宇宙の美しさと知識を探索しましょう。</p>
    </header>

    <!-- Messier Gallery -->
    <section class="container section">
        <h2 style="margin-bottom: 2rem; border-left: 4px solid var(--accent-blue); padding-left: 1rem;">宇宙美術館 (Messier Gallery)</h2>
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="星雲">星雲</button>
            <button class="filter-btn" data-filter="星団">星団</button>
            <button class="filter-btn" data-filter="銀河">銀河</button>
        </div>
        <div id="messier-gallery" class="gallery-grid">
            <!-- Dynamic Gallery Items -->
        </div>
    </section>

    <!-- 2026 Events -->
    <section class="container section">
        <div class="glass card">
            <h2 style="margin-bottom: 2rem; color: var(--accent-blue);">2026年 注目天体現象</h2>
            <div id="event-timeline" class="timeline">
                <!-- Dynamic Timeline Items -->
            </div>
        </div>
    </section>

    <!-- Seasonal Database -->
    <section class="container section">
        <h2 style="margin-bottom: 2rem; border-left: 4px solid var(--accent-green); padding-left: 1rem;">季節の星座・天体データベース</h2>
        <div class="tabs">
            <button class="tab-btn active" data-season="春">Spring</button>
            <button class="tab-btn" data-season="夏">Summer</button>
            <button class="tab-btn" data-season="秋">Autumn</button>
            <button class="tab-btn" data-season="冬">Winter</button>
        </div>
        <div id="seasonal-content" class="glass card" style="min-height: 200px;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="border-bottom: 1px solid var(--glass-border); color: var(--accent-green);">
                        <th style="padding: 1rem;">名称</th>
                        <th style="padding: 1rem;">星座</th>
                        <th style="padding: 1rem;">種類</th>
                        <th style="padding: 1rem;">別名</th>
                    </tr>
                </thead>
                <tbody id="seasonal-tbody">
                    <!-- Dynamic Table Rows -->
                </tbody>
            </table>
        </div>
    </section>

    <!-- Recommended Apps -->
    <section class="container section" style="margin-bottom: 6rem;">
        <h2 style="margin-bottom: 2rem; text-align: center;">おススメアプリ・ツール</h2>
        <div id="app-grid" class="app-grid">
            <!-- Dynamic App Cards -->
        </div>
    </section>

    <footer style="text-align: center; padding: 4rem 0; color: var(--text-secondary); border-top: 1px solid var(--glass-border);">
        <p>&copy; 2026 ORION PATH. Built with AI Orchestra.</p>
    </footer>

    <script src="src/library.js"></script>
</body>
</html>
